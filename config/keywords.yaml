  - machine learning
  - artificial intelligence
  - AI/ML
  - deep learning
  - NLP
  - natural language processing
  - LLM
  - large language model
  - generative AI
  - gen AI
  - MLOps
  - applied AI
  - data science
  - neural network
  - transformer
  - pytorch
  - tensorflow
  - RAG
  - agentic AI

# ─── EXCLUSION KEYWORDS ──────────────────────────────────────────────────────
# If JD contains these, auto-skip
hard_exclusions:
  - "PhD required"
  - "PhD is required"
  - "requires a PhD"
  - "10+ years"
  - "10 or more years"
  - "security clearance"
  - "US citizens only"
  - "must be authorized to work in the US"
  - "no sponsorship"

# ─── HIGH-VALUE JD SIGNALS ───────────────────────────────────────────────────
# Patterns that boost match score
positive_signals:
  remote_friendly:
    - "fully remote"
    - "remote-first"
    - "work from anywhere"
    - "remote ok"
    - "remote position"
  canada_friendly:
    - "canada"
    - "canadian"
    - "ontario"
    - "toronto"
    - "gta"
  good_fit_phrases:
    - "production ML"
    - "end-to-end ML"
    - "LLM integration"
    - "RAG pipeline"
    - "agentic"
    - "AI agent"
    - "model deployment"
    - "NLP pipeline"
    - "fine-tuning"

# ─── ATS CRITICAL TERMS ──────────────────────────────────────────────────────
# Terms that must appear in resume if in JD (for ATS scoring)
ats_critical:
  - machine learning
  - artificial intelligence
  - Python
  - deep learning
  - neural network
  - NLP
  - LLM
  - transformer
  - cloud
  - Docker
  - API
  - REST
  - CI/CD
  - agile
